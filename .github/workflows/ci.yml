name: Main CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.11"
            extras: ""
          - python-version: "3.12"
            extras: "vector"
          - python-version: "3.13"
            extras: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          if [ -n "${{ matrix.extras }}" ]; then
            uv sync --group test --group ${{ matrix.extras }}
          else
            uv sync --group test
          fi

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Run all tests with coverage
        run: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=85

      - name: Validate tool discovery (≥21 standard tools)
        run: |
          uv run python -c "
          from src import tools

          print(f'Discovered {len(tools.__all__)} tools: {sorted(tools.__all__)}')

          expected = [
              'append_block_in_page', 'create_page', 'delete_block', 'delete_page',
              'edit_block', 'find_pages_by_property', 'get_all_page_content',
              'get_all_pages', 'get_block_content', 'get_linked_flashcards',
              'get_page_backlinks', 'get_page_blocks', 'get_page_links',
              'get_pages_from_namespace', 'get_pages_tree_from_namespace',
              'insert_nested_block', 'query', 'rename_page', 'search',
              'set_block_properties', 'update_block', 'update_page',
          ]

          for tool in expected:
              assert tool in tools.__all__, f'Missing expected tool: {tool}'

          assert len(tools.__all__) >= 21, f'Expected ≥21 tools, found {len(tools.__all__)}'
          print('✅ All 22 standard tools discovered')
          "

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-python${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml

  build-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group test

      - name: Build package
        run: uv build

      - name: Test package installation
        run: |
          uv run pip install dist/*.whl
          uv run python -c "
          from src import tools
          print(f'✅ Package installation successful: {len(tools.__all__)} tools available')
          assert len(tools.__all__) >= 21
          "

  ci-summary:
    runs-on: ubuntu-latest
    needs: [test, build-test]
    if: always()

    steps:
      - name: CI Summary
        run: |
          echo "🔍 CI Pipeline Summary"
          echo "====================="

          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Tests: PASSED"
          else
            echo "❌ Tests: FAILED"
          fi

          if [ "${{ needs.build-test.result }}" == "success" ] || [ "${{ needs.build-test.result }}" == "skipped" ]; then
            echo "✅ Build: PASSED/SKIPPED"
          else
            echo "❌ Build: FAILED"
          fi

          if [ "${{ needs.test.result }}" == "success" ]; then
            echo ""
            echo "🎉 CI pipeline completed successfully!"
            echo "✅ Code is ready for merge"
          else
            echo ""
            echo "❌ CI pipeline failed"
            echo "Please address the issues before merging"
            exit 1
          fi
