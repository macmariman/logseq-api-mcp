<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 310" width="960" height="310">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#2563eb"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="960" height="310" fill="#ffffff"/>

  <!-- ── AI Client ─────────────────────────────────────────────────── -->
  <rect x="20" y="105" width="158" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="99" y="136" text-anchor="middle" fill="#1e3a5f" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">AI Client</text>
  <text x="99" y="156" text-anchor="middle" fill="#4b5563" font-family="system-ui,-apple-system,sans-serif" font-size="10">Claude · Cursor · Zed</text>
  <text x="99" y="183" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500">MCP Protocol</text>

  <!-- arrow AI → server -->
  <line x1="178" y1="150" x2="224" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ── logseq-api-mcp HERO ─────────────────────────────────────── -->
  <rect x="224" y="28" width="248" height="248" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="348" y="60" text-anchor="middle" fill="#5b21b6" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="700">logseq-api-mcp</text>

  <rect x="240" y="72" width="216" height="36" rx="5" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="348" y="95" text-anchor="middle" fill="#5b21b6" font-family="system-ui,-apple-system,sans-serif" font-size="11">22 Read + Write Tools</text>

  <rect x="240" y="116" width="216" height="36" rx="5" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="348" y="139" text-anchor="middle" fill="#5b21b6" font-family="system-ui,-apple-system,sans-serif" font-size="11">Dynamic Tool Discovery</text>

  <rect x="240" y="160" width="216" height="36" rx="5" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="348" y="183" text-anchor="middle" fill="#5b21b6" font-family="system-ui,-apple-system,sans-serif" font-size="11">Privacy Filter (exclude_tags)</text>

  <rect x="240" y="204" width="216" height="36" rx="5" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5,2"/>
  <text x="348" y="227" text-anchor="middle" fill="#7c3aed" font-family="system-ui,-apple-system,sans-serif" font-size="11">Vector Search  (optional)</text>

  <!-- arrow server → logseq -->
  <line x1="472" y1="150" x2="516" y2="150" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- ── Logseq ─────────────────────────────────────────────────────── -->
  <rect x="516" y="105" width="172" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="602" y="136" text-anchor="middle" fill="#1e3a5f" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Logseq</text>
  <text x="602" y="156" text-anchor="middle" fill="#4b5563" font-family="system-ui,-apple-system,sans-serif" font-size="10">HTTP API</text>
  <text x="602" y="183" text-anchor="middle" fill="#2563eb" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500">:12315</text>

  <!-- arrow logseq → graph -->
  <line x1="688" y1="150" x2="730" y2="150" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- ── Knowledge Graph ───────────────────────────────────────────── -->
  <rect x="730" y="105" width="210" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="835" y="132" text-anchor="middle" fill="#14532d" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="600">Knowledge Graph</text>
  <text x="835" y="152" text-anchor="middle" fill="#4b5563" font-family="system-ui,-apple-system,sans-serif" font-size="10">Pages · Blocks · Journals</text>
  <text x="835" y="183" text-anchor="middle" fill="#16a34a" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="500">Markdown + DB mode</text>

  <!-- caption -->
  <text x="480" y="296" text-anchor="middle" fill="#9ca3af" font-family="system-ui,-apple-system,sans-serif" font-size="10">Drop a .py file in src/tools/ — it registers automatically. No imports, no config changes required.</text>
</svg>
